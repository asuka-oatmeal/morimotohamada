name: Generate Daily Article

on:
  schedule:
    # 毎日日本時間の朝9時（UTC 0時）に実行
    - cron: "0 0 * * *"
  workflow_dispatch: # 手動実行も可能

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install @google/generative-ai gray-matter

      - name: Generate article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ARTICLE_COUNT: "1"
        run: node scripts/generate-article.mjs

      - name: Add internal links
        run: node scripts/internal-links.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/articles/ content/keywords.json
          if git diff --staged --quiet; then
            echo "No new articles to commit"
          else
            git commit -m "Add daily article $(date +%Y-%m-%d)"
            git push
          fi
