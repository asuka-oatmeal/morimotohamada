<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#5c4a3a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#5c4a3a">遺産分割協議の流れ</text>

  <!-- Step 1 -->
  <rect x="50" y="58" width="700" height="64" rx="12" fill="#faf8f5" stroke="#d9cfbf" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="90" cy="90" r="18" fill="#c0764a"/>
  <text x="90" y="96" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">1</text>
  <text x="120" y="82" font-size="14" font-weight="bold" fill="#5c4a3a">相続人の確定</text>
  <text x="120" y="100" font-size="12" fill="#9a8e80">故人の出生から死亡までの戸籍謄本を取得し、法定相続人を漏れなく把握する</text>

  <!-- Arrow -->
  <polygon points="400,126 393,126 400,142 407,126" fill="#d9cfbf"/>

  <!-- Step 2 -->
  <rect x="50" y="148" width="700" height="64" rx="12" fill="#faf8f5" stroke="#d9cfbf" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="90" cy="180" r="18" fill="#c0764a"/>
  <text x="90" y="186" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">2</text>
  <text x="120" y="172" font-size="14" font-weight="bold" fill="#5c4a3a">相続財産の調査・評価</text>
  <text x="120" y="190" font-size="12" fill="#9a8e80">不動産・預貯金・株式・借金などプラス/マイナスの財産をすべて洗い出し、評価額を算出</text>

  <!-- Arrow -->
  <polygon points="400,216 393,216 400,232 407,216" fill="#d9cfbf"/>

  <!-- Step 3 -->
  <rect x="50" y="238" width="700" height="64" rx="12" fill="#faf8f5" stroke="#d9cfbf" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="90" cy="270" r="18" fill="#c0764a"/>
  <text x="90" y="276" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">3</text>
  <text x="120" y="262" font-size="14" font-weight="bold" fill="#5c4a3a">相続人全員で遺産分割協議</text>
  <text x="120" y="280" font-size="12" fill="#9a8e80">全員参加が必須。寄与分・特別受益も考慮して「誰が・何を・どれだけ」取得するか話し合う</text>

  <!-- Arrow -->
  <polygon points="400,306 393,306 400,322 407,306" fill="#d9cfbf"/>

  <!-- Step 4 -->
  <rect x="50" y="328" width="700" height="64" rx="12" fill="#faf8f5" stroke="#c0764a" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="90" cy="360" r="18" fill="#c0764a"/>
  <text x="90" y="366" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">4</text>
  <text x="120" y="352" font-size="14" font-weight="bold" fill="#5c4a3a">遺産分割協議書の作成</text>
  <text x="120" y="370" font-size="12" fill="#9a8e80">財産を正確に特定して記載。相続人全員が署名し実印を押印。印鑑証明書を添付</text>

  <!-- Arrow -->
  <polygon points="400,396 393,396 400,412 407,396" fill="#d9cfbf"/>

  <!-- Step 5 -->
  <rect x="50" y="418" width="700" height="68" rx="12" fill="#e8e0d4" stroke="#5c4a3a" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="90" cy="452" r="18" fill="#5c4a3a"/>
  <text x="90" y="458" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">5</text>
  <text x="120" y="442" font-size="14" font-weight="bold" fill="#5c4a3a">各種名義変更・相続税申告</text>
  <text x="120" y="460" font-size="12" fill="#9a8e80">不動産の相続登記（3年以内に義務化）/ 預貯金の解約・引出し / 相続税の申告・納税（10ヶ月以内）</text>

  <!-- Caution badges -->
  <rect x="560" y="60" width="180" height="28" rx="6" fill="#c0764a" opacity="0.12"/>
  <text x="650" y="79" text-anchor="middle" font-size="11" font-weight="bold" fill="#c0764a">1人でも欠けると無効</text>

  <rect x="560" y="330" width="180" height="28" rx="6" fill="#c0764a" opacity="0.12"/>
  <text x="650" y="349" text-anchor="middle" font-size="11" font-weight="bold" fill="#c0764a">実印+印鑑証明が必須</text>
</svg>